<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Antistaff Notation Editor</title>
</head>

<body>
    <div class="button-row">
        <button id="antistaff-editor" type="button">Antistaff Editor</button>
        <button id="antistaff-example" type="button">Antistaff IRL Example</button>
        <button id="sheet-example" type="button">Original Sheet IRL</button>
    </div>
    <div class="editor-row">
        <span id="container"></span>
        <span id="symbol-edit">
            <button id="clear-cell">Delete</button>
            <label>
                Symbol type:
                <select id="symbol-type">
                    <option value="n">Note</option>
                    <option value="c">Size Change</option>
                </select>
            </label>
            <div id="edit-options"></div>
        </divspan>
    </div>
    <div id="sheet-tab-buttons" class="button-row">
        <button>Sheet 1</button>
        <input type="number">
        <button>Add Sheet</button>
    </div>
    <!-- <div id="edit-options" class="modal" style="display: none">
        <span id="close-edit-options">x</span><button id="delete-cell-contents">Delete</button>
    </div> -->
    <script src="main.js"></script>
</body>

</html>
